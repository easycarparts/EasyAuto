<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Confirm your new EasyAuto email</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f8fafc; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: #334155;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f8fafc;">
      <tr>
        <td align="center" style="padding: 40px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width: 520px; background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px -12px rgba(15, 23, 42, 0.12);">
            <tr>
              <td style="padding: 28px 32px 20px; border-bottom: 1px solid #e2e8f0; background-color: #ffffff;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="width: 40px; height: 40px; border-radius: 12px; background-color: #1f4ae0; text-align: center; vertical-align: middle; color: #ffffff; font-size: 14px; font-weight: 800; letter-spacing: -0.02em;">
                      EA
                    </td>
                    <td style="padding-left: 12px; font-size: 20px; font-weight: 800; letter-spacing: -0.03em; color: #0f172a;">
                      Easy<span style="color: #1f4ae0;">Auto</span>
                    </td>
                  </tr>
                </table>
                <p style="margin: 14px 0 0; font-size: 13px; line-height: 1.5; color: #64748b;">
                  UAE Auto Services Directory
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px;">
                <h1 style="margin: 0 0 12px; font-size: 22px; line-height: 1.3; font-weight: 700; color: #0f172a;">
                  Confirm your new email address
                </h1>
                <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.6; color: #334155;">
                  Confirm this change for your EasyAuto account by clicking the button below.
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="border-radius: 12px; background-color: #1f4ae0;">
                      <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 22px; font-size: 15px; font-weight: 600; color: #ffffff; text-decoration: none;">
                        Confirm new email
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin: 24px 0 0; font-size: 13px; line-height: 1.6; color: #94a3b8;">
                  If you did not request this change, contact us and secure your account.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 20px 32px 28px; border-top: 1px solid #e2e8f0; background-color: #f8fafc;">
                <p style="margin: 0; font-size: 12px; line-height: 1.6; color: #94a3b8;">
                  EasyAuto &middot; <a href="https://www.easyauto.ae" style="color: #1f4ae0; text-decoration: none;">easyauto.ae</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
